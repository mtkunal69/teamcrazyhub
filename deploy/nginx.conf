# ─────────────────────────────────────────────────────────────
# TeamCrazy Hub — Nginx config
# Save as: /etc/nginx/sites-available/teamcrazy-hub
# Symlink:  sudo ln -s /etc/nginx/sites-available/teamcrazy-hub \
#                       /etc/nginx/sites-enabled/teamcrazy-hub
# Reload:   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────

# Rate limit zone for /api (10 req/s per IP, burst 20)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Redirect HTTP -> HTTPS (after Certbot adds SSL block)
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL certs (managed by Certbot after first run)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload size (for screen recordings)
    client_max_body_size 100M;

    # ── Frontend (static React build) ─────────────────────────
    root /var/www/teamcrazy-hub/frontend/build;
    index index.html;

    # Cache static assets aggressively
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Backend API ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
        proxy_connect_timeout 300s;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 100M;
    }

    # ── SPA fallback (React Router) ──────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide nginx version
    server_tokens off;

    access_log /var/log/nginx/teamcrazy-access.log;
    error_log  /var/log/nginx/teamcrazy-error.log;
}
